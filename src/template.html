<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
</head>
<body>
    <div id="sidebar">
        <p>Projects</p>
        <button id="newProject">+ New Project</button>
        <div id="projects"></div>
    </div>
    <div id="main">
        <button id="newTask">+ New Task</button>
        <div id="todos"></div>
    </div>
    <div id="projectModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <p>New Project</p>
            <form action="" id="projectForm">
                <input type="text" id="title" name="title" placeholder="Title">
                <button type="submit">Create Project</button>
            </form>
        </div>
    </div>
    <div id="todoModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <p>New Task</p>
            <form action="" id="todoForm">
                <input type="text" id="title" name="title" placeholder="Title">
                <input type="text" id="description" name="description" placeholder="Description">
                <input type="date" id="dueDate" name="dueDate" placeholder="Due date">
                <select name="priority" id="priority" name="priority">
                    <option value="">Priority</option>
                    <option value="high">High</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                </select>
                <button type="submit">Create task</button>
            </form>
        </div>
    </div>
</body>
</html>
